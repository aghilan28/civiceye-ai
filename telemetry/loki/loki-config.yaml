auth_enabled: false

server:
  http_listen_port: 3100

ingester:
  wal:
    enabled: true
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: civiceye_
        period: 24h

storage_config:
  filesystem:
    directory: /loki

limits_config:
  retention_period: 30d
