experiment_name: pothole_yolov8n_phase_d_negative_aware
dataset_version: v0.3.0
yolo_data_yaml: ai/exports/yolo/pothole_v0.3.0/data.yaml
model: yolov8n.pt
pretrained_weights:
resume_checkpoint:
epochs: 100
image_size: 640
batch_size: 16
workers: 8
device: auto
mixed_precision: true
optimizer: auto
scheduler: cosine
learning_rate:
weight_decay:
patience: 20
seed: 42
project: ai/experiments/pothole_detection
run_name: yolov8n_v0.3.0_negative_aware
augmentation_profile: pothole_field_conditions
classes:
  - pothole
severity_labels:
  - minor
  - moderate
  - severe
  - critical
device_config:
  allow_cpu_fallback: true
  min_free_vram_gb: 2.0
  batch_scale_safety: 0.8
tracking:
  mlflow_enabled: true
  mlflow_tracking_uri: file:./ai/experiments/mlruns
  wandb_enabled: false
  wandb_project: civiceye-pothole-detection
  tags:
    phase: phase_d
    detector: pothole
    objective: false_positive_reduction
evaluation:
  save_confusion_matrix: true
  save_pr_curve: true
  save_predictions: true
  iou_threshold: 0.5
  confidence_thresholds:
    - 0.2
    - 0.25
    - 0.35
    - 0.5
  hard_negative_categories:
    - puddle
    - road_patch
    - shadow
    - oil_stain
    - road_marking
    - crack
    - debris
    - wet_road
    - reflection
    - lane_marking
export:
  formats:
    - onnx
    - torchscript
  dynamic: true
  simplify: true
  opset: 12
  half: false
  int8: false
  include_tensorrt_ready_metadata: true
