services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: civiceye
      POSTGRES_USER: civiceye
      POSTGRES_PASSWORD: civiceye_dev_password
    ports:
      - "5432:5432"
    volumes:
      - civiceye_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civiceye -d civiceye"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - civiceye_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  migrations:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "npm ci && npx prisma migrate deploy && npx prisma generate"]
    environment:
      DATABASE_URL: postgresql://civiceye:civiceye_dev_password@postgres:5432/civiceye?schema=public
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  civiceye-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_REALTIME_URL: ws://localhost:8000/api/v1/operations/events
      NEXT_PUBLIC_AI_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_AI_INFERENCE_URL: http://localhost:8000/predict/image
      NEXT_PUBLIC_MUNICIPALITY_ID: MUNI-BLR
      DATABASE_URL: postgresql://civiceye:civiceye_dev_password@postgres:5432/civiceye?schema=public
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      CIVICEYE_MODEL_WEIGHTS: /app/ai/checkpoints/best.pt
      CIVICEYE_FALLBACK_WEIGHTS: /app/yolov8n.pt
      CIVICEYE_MODEL_VERSION: pothole-yolov8-v0.2.0
      CIVICEYE_STORAGE_DIR: /app/runtime/ai
      CIVICEYE_CONFIDENCE: "0.25"
      CIVICEYE_IOU: "0.50"
      CIVICEYE_IMAGE_SIZE: "960"
      CIVICEYE_FRAME_SKIP: "1"
      CIVICEYE_BATCH_SIZE: "4"
      CIVICEYE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql://civiceye:civiceye_dev_password@postgres:5432/civiceye
      REDIS_URL: redis://redis:6379/0
      CIVICEYE_JWT_SECRET: civiceye-local-dev-jwt-secret-change-before-prod-2026
      CIVICEYE_WORKER_SHARED_SECRET: civiceye-local-dev-worker-secret-change-before-prod-2026
      CIVICEYE_ENABLE_LOCAL_CPU_FALLBACK: "true"
    volumes:
      - ./runtime/ai:/app/runtime/ai
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    restart: unless-stopped

  inference-worker-gpu:
    profiles: ["gpu-worker"]
    build:
      context: .
      dockerfile: Dockerfile.ai
    command: ["python3", "-m", "backend.distributed.worker"]
    environment:
      CIVICEYE_MODEL_WEIGHTS: /app/models/best.pt
      CIVICEYE_FALLBACK_WEIGHTS: /app/yolov8n.pt
      CIVICEYE_MODEL_VERSION: pothole-yolov8-v0.2.0
      CIVICEYE_STORAGE_DIR: /app/runtime/ai
      CIVICEYE_QUEUE_NAME: gpu.high
      CIVICEYE_WORKER_ID: gpu-worker-compose-0
      CIVICEYE_WORKER_SHARED_SECRET: civiceye-local-dev-worker-secret-change-before-prod-2026
      DATABASE_URL: postgresql://civiceye:civiceye_dev_password@postgres:5432/civiceye
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./runtime/ai:/app/runtime/ai
      - ./ai/checkpoints:/app/models:ro
    depends_on:
      backend-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: civiceye
      GF_SECURITY_ADMIN_PASSWORD: civiceye_dev_password
    volumes:
      - civiceye_grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  civiceye_postgres:
  civiceye_redis:
  civiceye_grafana:
