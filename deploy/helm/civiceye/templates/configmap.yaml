apiVersion: v1
kind: ConfigMap
metadata:
  name: civiceye-runtime-config
  namespace: civiceye
data:
  CIVICEYE_MODEL_VERSION: pothole-yolov8-v0.2.0
  CIVICEYE_STORAGE_DIR: /app/runtime/ai
  CIVICEYE_CONFIDENCE: "0.25"
  CIVICEYE_IOU: "0.50"
  CIVICEYE_IMAGE_SIZE: "960"
  CIVICEYE_FRAME_SKIP: "1"
  CIVICEYE_BATCH_SIZE: "4"
  CIVICEYE_OBJECT_STORAGE_PROVIDER: {{ .Values.api.env.CIVICEYE_OBJECT_STORAGE_PROVIDER | quote }}
  CIVICEYE_OBJECT_STORAGE_BUCKET: {{ .Values.api.env.CIVICEYE_OBJECT_STORAGE_BUCKET | quote }}
  CIVICEYE_OBJECT_STORAGE_REGION: {{ .Values.api.env.CIVICEYE_OBJECT_STORAGE_REGION | quote }}
  CIVICEYE_REQUIRE_AUTH: {{ .Values.api.env.CIVICEYE_REQUIRE_AUTH | quote }}
  CIVICEYE_WEBSOCKET_MAX_MESSAGES_PER_MINUTE: {{ .Values.api.env.CIVICEYE_WEBSOCKET_MAX_MESSAGES_PER_MINUTE | quote }}
  NEXT_PUBLIC_API_BASE_URL: https://api.civiceye.example.com/api/v1
  NEXT_PUBLIC_REALTIME_URL: wss://api.civiceye.example.com/api/v1/operations/events
  NEXT_PUBLIC_AI_BACKEND_URL: https://api.civiceye.example.com
