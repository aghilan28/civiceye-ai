apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: civiceye-runtime-media
  namespace: civiceye
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.api.storageSize }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: civiceye
  namespace: civiceye
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.global.domain | quote }}
        - {{ printf "api.%s" .Values.global.domain | quote }}
      secretName: {{ .Values.ingress.tlsSecret | quote }}
  rules:
    - host: {{ .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: civiceye-web
                port:
                  number: 3000
    - host: {{ printf "api.%s" .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: civiceye-api
                port:
                  number: 8000
{{- end }}
