apiVersion: apps/v1
kind: Deployment
metadata:
  name: civiceye-web
  namespace: civiceye
  labels:
    app: civiceye-web
spec:
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: civiceye-web
  template:
    metadata:
      labels:
        app: civiceye-web
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: civiceye-runtime-config
          env:
            - name: NEXT_PUBLIC_APP_URL
              value: https://civiceye.example.com
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: civiceye-web
  namespace: civiceye
spec:
  selector:
    app: civiceye-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: civiceye-web
  namespace: civiceye
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: civiceye-web
  minReplicas: {{ .Values.web.minReplicas }}
  maxReplicas: {{ .Values.web.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
