apiVersion: v1
kind: Namespace
metadata:
  name: civiceye
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: civiceye-runtime-config
  namespace: civiceye
data:
  CIVICEYE_MODEL_VERSION: pothole-yolov8-v0.2.0
  CIVICEYE_STORAGE_DIR: /app/runtime/ai
  CIVICEYE_CONFIDENCE: "0.25"
  CIVICEYE_IOU: "0.50"
  CIVICEYE_IMAGE_SIZE: "960"
  CIVICEYE_FRAME_SKIP: "1"
  CIVICEYE_BATCH_SIZE: "4"
  NEXT_PUBLIC_API_BASE_URL: https://api.civiceye.example.com/api/v1
  NEXT_PUBLIC_REALTIME_URL: wss://api.civiceye.example.com/api/v1/operations/events
  NEXT_PUBLIC_AI_BACKEND_URL: https://api.civiceye.example.com
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: civiceye-runtime-media
  namespace: civiceye
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: civiceye-api
  namespace: civiceye
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civiceye-api
  template:
    metadata:
      labels:
        app: civiceye-api
    spec:
      containers:
        - name: api
          image: ghcr.io/civiceye/civiceye-ai-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: CIVICEYE_MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: civiceye-runtime-config
                  key: CIVICEYE_MODEL_VERSION
            - name: CIVICEYE_STORAGE_DIR
              valueFrom:
                configMapKeyRef:
                  name: civiceye-runtime-config
                  key: CIVICEYE_STORAGE_DIR
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: redis-url
            - name: CIVICEYE_WORKER_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: worker-shared-secret
            - name: CIVICEYE_MODEL_WEIGHTS
              value: /models/best.pt
          volumeMounts:
            - name: ai-runtime
              mountPath: /app/runtime/ai
            - name: model-artifacts
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: ai-runtime
          persistentVolumeClaim:
            claimName: civiceye-runtime-media
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: civiceye-model-artifacts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: civiceye-web
  namespace: civiceye
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civiceye-web
  template:
    metadata:
      labels:
        app: civiceye-web
    spec:
      containers:
        - name: web
          image: ghcr.io/civiceye/civiceye-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: civiceye-runtime-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: civiceye-inference-gpu
  namespace: civiceye
spec:
  replicas: 1
  selector:
    matchLabels:
      app: civiceye-inference-gpu
  template:
    metadata:
      labels:
        app: civiceye-inference-gpu
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: worker
          image: ghcr.io/civiceye/civiceye-ai-backend:latest
          command: ["python3", "-m", "backend.distributed.worker"]
          resources:
            limits:
              nvidia.com/gpu: 1
          env:
            - name: CIVICEYE_MODEL_WEIGHTS
              value: /models/best.pt
            - name: CIVICEYE_QUEUE_NAME
              value: gpu.high
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: redis-url
            - name: CIVICEYE_WORKER_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: civiceye-secrets
                  key: worker-shared-secret
          volumeMounts:
            - name: ai-runtime
              mountPath: /app/runtime/ai
            - name: model-artifacts
              mountPath: /models
              readOnly: true
          readinessProbe:
            exec:
              command: ["python3", "-c", "from backend.gpu.device import get_device_info; raise SystemExit(0 if get_device_info().cuda_available else 1)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["python3", "-c", "from backend.gpu.device import get_device_info; raise SystemExit(0 if get_device_info().cuda_available else 1)"]
            initialDelaySeconds: 60
            periodSeconds: 60
      volumes:
        - name: ai-runtime
          persistentVolumeClaim:
            claimName: civiceye-runtime-media
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: civiceye-model-artifacts
---
apiVersion: v1
kind: Service
metadata:
  name: civiceye-api
  namespace: civiceye
spec:
  type: ClusterIP
  selector:
    app: civiceye-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: civiceye-web
  namespace: civiceye
spec:
  type: ClusterIP
  selector:
    app: civiceye-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: civiceye-api
  namespace: civiceye
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: civiceye-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
